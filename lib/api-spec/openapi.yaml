openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Financial Coach API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Financial analysis operations
  - name: goals
    description: Financial goals
  - name: netWorth
    description: Net worth tracking
  - name: debt
    description: Debt payoff planning
  - name: alerts
    description: Financial alerts
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analysis/run:
    post:
      operationId: runAnalysis
      tags: [analysis]
      summary: Run multi-agent financial analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinancialInput"
      responses:
        "200":
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /analysis/history:
    get:
      operationId: listAnalysisHistory
      tags: [analysis]
      summary: List past analyses
      responses:
        "200":
          description: List of past analysis summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisSummary"
  /analysis/history/{id}:
    get:
      operationId: getAnalysis
      tags: [analysis]
      summary: Get a specific past analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteAnalysis
      tags: [analysis]
      summary: Delete a past analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /analysis/stats:
    get:
      operationId: getAnalysisStats
      tags: [analysis]
      summary: Aggregate stats across all saved analyses
      responses:
        "200":
          description: Aggregated financial stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisStats"
  /analysis/insights:
    get:
      operationId: getAnalysisInsights
      tags: [analysis]
      summary: Smart insights computed from analysis history
      responses:
        "200":
          description: Computed insights, projections, velocity, health score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisInsights"
  /analysis/recurring:
    get:
      operationId: getRecurringTransactions
      tags: [analysis]
      summary: Detect recurring transactions from latest analysis
      responses:
        "200":
          description: Detected recurring transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecurringTransaction"
  /analysis/export/csv:
    get:
      operationId: exportAnalysisCsv
      tags: [analysis]
      summary: Export all analyses as CSV download
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
  /goals:
    get:
      operationId: getGoals
      tags: [goals]
      summary: Get current financial goals
      responses:
        "200":
          description: Current goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goals"
    put:
      operationId: upsertGoals
      tags: [goals]
      summary: Create or update financial goals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalsInput"
      responses:
        "200":
          description: Updated goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goals"
  /net-worth:
    get:
      operationId: listNetWorth
      tags: [netWorth]
      summary: List all net worth entries
      responses:
        "200":
          description: Net worth entries sorted by date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetWorthEntry"
    post:
      operationId: createNetWorthEntry
      tags: [netWorth]
      summary: Add a net worth snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetWorthInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetWorthEntry"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /net-worth/{id}:
    delete:
      operationId: deleteNetWorthEntry
      tags: [netWorth]
      summary: Delete a net worth entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /debt/payoff-plan:
    get:
      operationId: getDebtPayoffPlan
      tags: [debt]
      summary: Month-by-month debt payoff schedule from latest analysis
      responses:
        "200":
          description: Avalanche and snowball payoff plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPayoffPlan"
  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Get active financial alerts based on latest data
      responses:
        "200":
          description: Active alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
  /auth/signup:
    post:
      operationId: signupUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Log in an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Log out the current user session
      responses:
        "200":
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Verify the active session and get current user details
      responses:
        "200":
          description: Active session user details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Session invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get user profile details
      responses:
        "200":
          description: User profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteProfile
      tags: [users]
      summary: Delete user profile and all associated data
      responses:
        "204":
          description: Profile deleted successfully
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get the current user's profile details
      responses:
        "200":
          description: User profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateUserProfile
      tags: [users]
      summary: Update the current user's profile details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid fields or incorrect current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteUserProfile
      tags: [users]
      summary: Delete user profile and all associated data
      responses:
        "204":
          description: Profile deleted successfully
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /billing/create-subscription:
    post:
      operationId: createSubscription
      tags: [billing]
      summary: Create a new Razorpay subscription
      responses:
        "200":
          description: Subscription created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptionId:
                    type: string
                  keyId:
                    type: string
                required: [subscriptionId, keyId]
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /billing/verify-signature:
    post:
      operationId: verifySignature
      tags: [billing]
      summary: Verify the Razorpay payment signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                razorpayPaymentId:
                  type: string
                razorpaySubscriptionId:
                  type: string
                razorpaySignature:
                  type: string
              required: [razorpayPaymentId, razorpaySubscriptionId, razorpaySignature]
      responses:
        "200":
          description: Signature verified and user upgraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /billing/cancel-subscription:
    post:
      operationId: cancelSubscription
      tags: [billing]
      summary: Cancel the active Razorpay subscription
      responses:
        "200":
          description: Subscription cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Subscription not found or already cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vault/accounts:
    get:
      operationId: getVaultAccounts
      tags: [vault]
      summary: Get all accounts in the financial vault
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultAccount"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createVaultAccount
      tags: [vault]
      summary: Create a new account in the vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultAccountInput"
      responses:
        "201":
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultAccount"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vault/accounts/{id}:
    delete:
      operationId: deleteVaultAccount
      tags: [vault]
      summary: Delete an account from the vault
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Account deleted successfully
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vault/investments:
    get:
      operationId: getVaultInvestments
      tags: [vault]
      summary: Get all investments in the financial vault
      responses:
        "200":
          description: List of investments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultInvestment"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createVaultInvestment
      tags: [vault]
      summary: Create a new investment in the vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultInvestmentInput"
      responses:
        "201":
          description: Investment created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultInvestment"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vault/investments/{id}:
    delete:
      operationId: deleteVaultInvestment
      tags: [vault]
      summary: Delete an investment from the vault
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Investment deleted successfully
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Investment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vault/insurance:
    get:
      operationId: getVaultInsurancePolicies
      tags: [vault]
      summary: Get all insurance policies in the financial vault
      responses:
        "200":
          description: List of insurance policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultInsurancePolicy"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createVaultInsurancePolicy
      tags: [vault]
      summary: Create a new insurance policy in the vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultInsurancePolicyInput"
      responses:
        "201":
          description: Insurance policy created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultInsurancePolicy"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vault/insurance/{id}:
    delete:
      operationId: deleteVaultInsurancePolicy
      tags: [vault]
      summary: Delete an insurance policy from the vault
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Insurance policy deleted successfully
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Insurance policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /investments/benchmark-rates:
    get:
      operationId: getBenchmarkRates
      tags: [investments]
      summary: Get typical market benchmark returns
      responses:
        "200":
          description: Typical market return rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestmentBenchmarkRates"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /investments/scenarios:
    get:
      operationId: listInvestmentScenarios
      tags: [investments]
      summary: List saved investment scenarios for the user
      responses:
        "200":
          description: Saved scenarios list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvestmentScenario"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createInvestmentScenario
      tags: [investments]
      summary: Save a new investment scenario projection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestmentScenarioInput"
      responses:
        "201":
          description: Scenario saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestmentScenario"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Premium subscription required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /investments/scenarios/{id}:
    delete:
      operationId: deleteInvestmentScenario
      tags: [investments]
      summary: Delete a saved investment scenario projection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Scenario deleted successfully
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Scenario not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]
    TrialExpiredError:
      type: object
      properties:
        error:
          type: string
          example: "TRIAL_EXPIRED"
        message:
          type: string
          example: "Your 15-day free trial has ended. Please upgrade to continue."
      required: [error, message]
    DebtItem:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
        interestRate:
          type: number
        minPayment:
          type: ["number", "null"]
      required: [name, amount, interestRate]
    FinancialInput:
      type: object
      properties:
        monthlyIncome:
          type: number
        dependants:
          type: integer
        expenses:
          type: object
          additionalProperties:
            type: number
        debts:
          type: array
          items:
            $ref: "#/components/schemas/DebtItem"
        notes:
          type: ["string", "null"]
      required: [monthlyIncome, expenses]
    SpendingCategory:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        percentage:
          type: number
      required: [category, amount, percentage]
    SpendingRecommendation:
      type: object
      properties:
        category:
          type: string
        recommendation:
          type: string
        potentialSavings:
          type: ["number", "null"]
      required: [category, recommendation]
    BudgetAnalysis:
      type: object
      properties:
        totalExpenses:
          type: number
        monthlyIncome:
          type: ["number", "null"]
        savingsRate:
          type: ["number", "null"]
        spendingCategories:
          type: array
          items:
            $ref: "#/components/schemas/SpendingCategory"
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/SpendingRecommendation"
        summary:
          type: string
      required: [totalExpenses, spendingCategories, recommendations, summary]
    EmergencyFund:
      type: object
      properties:
        recommendedAmount:
          type: number
        currentStatus:
          type: string
        monthsOfExpenses:
          type: number
      required: [recommendedAmount, currentStatus, monthsOfExpenses]
    SavingsRecommendation:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        rationale:
          type: string
      required: [category, amount, rationale]
    SavingsStrategy:
      type: object
      properties:
        emergencyFund:
          $ref: "#/components/schemas/EmergencyFund"
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/SavingsRecommendation"
        automationTips:
          type: array
          items:
            type: string
        summary:
          type: string
      required: [emergencyFund, recommendations, automationTips, summary]
    PayoffMethod:
      type: object
      properties:
        name:
          type: string
        totalInterest:
          type: number
        monthsToPayoff:
          type: integer
        monthlyPayment:
          type: ["number", "null"]
        order:
          type: array
          items:
            type: string
      required: [name, totalInterest, monthsToPayoff, order]
    DebtReduction:
      type: object
      properties:
        totalDebt:
          type: number
        avalanche:
          $ref: "#/components/schemas/PayoffMethod"
        snowball:
          $ref: "#/components/schemas/PayoffMethod"
        recommendations:
          type: array
          items:
            type: string
        summary:
          type: string
      required: [totalDebt, recommendations, summary]
    AnalysisResult:
      type: object
      properties:
        id:
          type: ["integer", "null"]
        createdAt:
          type: ["string", "null"]
